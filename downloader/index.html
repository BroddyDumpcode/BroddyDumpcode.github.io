<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/assets/css/style.css">
<meta charset="UTF-8">
<title>Video Downloader</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #050505;
    color: white;
    height: 100vh;
    overflow: hidden;
}

/* background glow */
.bg {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #00ffcc33, transparent);
    filter: blur(120px);
    animation: float 10s infinite alternate;
}

@keyframes float {
    from { transform: translate(-200px, -200px); }
    to { transform: translate(200px, 200px); }
}

.container {
    position: relative;
    z-index: 2;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 320px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-top: 10px;
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
    background: #00ffcc;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #00ccaa;
}

/* loading spinner */
.loader {
    margin-top: 20px;
    border: 4px solid #333;
    border-top: 4px solid #00ffcc;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    display: none;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* result */
.result {
    margin-top: 20px;
    display: none;
}

video {
    width: 320px;
    border-radius: 10px;
    margin-top: 10px;
}

.qualities button {
    margin: 5px;
    padding: 8px 15px;
    background: #222;
    color: white;
}

.download-link {
    display: block;
    margin-top: 10px;
    color: #00ffcc;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
    <div class="terminal">
        <p id="typing"></p>
    </div>
    <div class="card">
        <h1>🔥 Video Downloader</h1>

        <input type="text" id="url" placeholder="Paste link here...">
        <br>
        <button onclick="extract()">Extract</button>

        <div class="loader" id="loader"></div>

        <div class="result" id="result">
            <h3 id="title"></h3>
            <video id="player" controls></video>

            <div class="qualities" id="qualities"></div>
        </div>
    </div>
</div>

<script>
async function extract() {
    let url = document.getElementById("url").value
    let loader = document.getElementById("loader")
    let result = document.getElementById("result")

    if (!url) {
        alert("Masukin link dulu bro 😅")
        return
    }

    loader.style.display = "block"
    result.style.display = "none"

    // SIMULASI (nanti ganti ke backend lu)
    setTimeout(() => {
        loader.style.display = "none"
        result.style.display = "block"

        document.getElementById("title").innerText = "Sample Video"

        let player = document.getElementById("player")
        player.src = "https://www.w3schools.com/html/mov_bbb.mp4"

        let qualities = document.getElementById("qualities")
        qualities.innerHTML = ""

        let q = ["360p", "720p", "1080p"]

        q.forEach(q => {
            let btn = document.createElement("button")
            btn.innerText = q

            btn.onclick = () => {
                player.src = "https://www.w3schools.com/html/mov_bbb.mp4"
            }

            let link = document.createElement("a")
            link.href = player.src
            link.innerText = "Download"
            link.className = "download-link"

            qualities.appendChild(btn)
            qualities.appendChild(link)
        })

    }, 1500)
}
</script>
<script src="/assets/js/main.js"></script>
</body>
</html>
