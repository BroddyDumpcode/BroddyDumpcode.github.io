<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/assets/css/style.css">
<meta charset="UTF-8">
<h1 class="glitch" data-text="Brody Dev">Brody Dev</h1>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #050505;
    color: white;
    overflow-x: hidden;
}

/* glow background */
.glow {
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, #00ffcc33, transparent);
    filter: blur(120px);
    animation: move 10s infinite alternate;
    z-index: 0;
}

@keyframes move {
    from { transform: translate(-200px, -200px); }
    to { transform: translate(200px, 200px); }
}

/* container */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 80px;
}

/* profile */
.profile img {
    width: 120px;
    border-radius: 50%;
    border: 3px solid #00ffcc;
    box-shadow: 0 0 20px #00ffcc88;
}

.profile h1 {
    margin: 15px 0 5px;
}

.profile p {
    color: #aaa;
}

/* card */
.card {
    margin: 40px auto;
    width: 320px;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* tools */
.tool {
    margin: 15px 0;
    padding: 15px;
    background: #111;
    border-radius: 10px;
    transition: 0.3s;
    cursor: pointer;
}

.tool:hover {
    transform: scale(1.05);
    background: #1a1a1a;
}

.tool a {
    color: #00ffcc;
    text-decoration: none;
    font-weight: bold;
}

/* footer */
.footer {
    margin-top: 50px;
    color: #666;
}
</style>

</head>

<body>

<div class="glow"></div>

<div class="container">
    <div class="terminal">
        <p id="typing"></p>
    </div>
    <!-- PROFILE -->
    <div class="profile">
        <!-- GANTI USERNAME DI SINI -->
        <img src="https://github.com/broddydumpcode.png" alt="profile">
        <h1>Brody Dev</h1>
        <p>Web Tools & Downloader </p>
    </div>

    <!-- TOOLS -->
    <div class="card">
        <h2>My Tools</h2>

        <div class="tool">
            <a href="/downloader/">🔥 Video Downloader</a>
            <p>Download video dari berbagai platform</p>
        </div>

        <!-- Tambah tools nanti di sini -->
        <div class="tool">
            <a href="#">⚙️ Coming Soon</a>
            <p>More tools on the way...</p>
        </div>
    </div>

    <div class="footer">
        © 2026 Brody
    </div>

</div>
<script src="/assets/js/main.js"></script>
</body>
</html>
